<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>서울시장 투표 현황</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: white; padding: 30px; border-radius: 16px; width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 24px; font-size: 22px; }
        .row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #eee; font-size: 17px; }
        .name { font-weight: bold; color: #333; }
        .votes { color: #4e79e7; font-weight: bold; }
        .updated { text-align: right; font-size: 12px; color: #aaa; margin-top: 16px; }
        .error { color: red; text-align: center; padding: 20px; }
    </style>
</head>
<body>
<div class="box">
    <h2>🗳️ 서울시장 득표 현황</h2>
    <div id="vote-list">불러오는 중...</div>
    <div class="updated" id="updated-time"></div>
</div>

<script>
    function fetchVotes() {
        fetch('http://localhost:5000/votes')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('vote-list');

                if (data.length === 0) {
                    list.innerHTML = '<div class="error">데이터 없음</div>';
                    return;
                }

                list.innerHTML = data.map(item => `
                    <div class="row">
                        <span class="name">${item.name}</span>
                        <span class="votes">${Number(item.votes.replace(/,/g,'')).toLocaleString()}표</span>
                    </div>
                `).join('');

                document.getElementById('updated-time').textContent
                    = '마지막 업데이트: ' + new Date().toLocaleTimeString();
            })
            .catch(() => {
                document.getElementById('vote-list').innerHTML
                    = '<div class="error">서버 연결 실패 ❌</div>';
            });
    }

    fetchVotes();
    setInterval(fetchVotes, 30000); // 30초마다 자동 갱신
</script>
</body>
</html>
